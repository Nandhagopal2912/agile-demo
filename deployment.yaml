apiVersion: apps/v1
kind: Deployment
metadata:
  name: agile-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: agile-demo

  template:
    metadata:
      labels:
        app: agile-demo

    spec:
      containers:
      - name: agile-demo
        image: nandhagopal29/agile-demo-demo:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: agile-demo-service

spec:
  type: NodePort

  selector:
    app: agile-demo

  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007
